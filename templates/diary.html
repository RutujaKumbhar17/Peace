<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Journal - Project Peace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- FullCalendar -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/liquid-glass.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/diary.css') }}">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        heading: ["'Instrument Serif'", "serif"],
                        body: ["'Barlow'", "sans-serif"],
                    }
                }
            }
        }
    </script>
</head>
<body class="apple-theme h-screen flex overflow-hidden !bg-transparent">

    <!-- Meditative Background Layering -->
    <div class="fixed inset-0 bg-black -z-50"></div>
    <video id="diary-bg-video" class="diary-video" 
        autoplay muted loop playsinline preload="auto"
        poster="/static/img/meditative_waves_bg.png">
        <source src="{{ url_for('static', filename='assets/diary/bg_diary.mp4') }}" type="video/mp4">
    </video>

    <!-- Background Music Track -->
    <audio id="bg-music" src="{{ url_for('static', filename='assets/diary/bg_music_diary.mp3') }}" loop></audio>

    <!-- Atmospheric Aura Glows -->
    <div class="aura-glow aura-primary"></div>
    <div class="aura-glow aura-secondary"></div>

    <!-- Sidebar: History -->
    <aside class="w-80 sidebar flex flex-col bg-black/40 backdrop-blur-2xl border-r border-white/5">
        <div class="p-8 pb-4">
            <h1 class="text-3xl font-heading italic mb-6">Journal History</h1>
            <button id="new-entry-btn" class="w-full liquid-glass-strong py-4 rounded-full flex items-center justify-center gap-3 hover:scale-[1.02] transition-all text-sm font-medium border border-white/10">
                <i class="fas fa-pen-nib text-xs"></i> New Journal Entry
            </button>
            <div class="mt-6 relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-white/20 text-xs"></i>
                <input type="text" id="search-entries" placeholder="Search your past..." 
                    class="w-full bg-white/[0.03] border border-white/10 rounded-full py-3 pl-11 pr-4 text-xs outline-none focus:border-white/30 transition-all">
            </div>
        </div>
        
        <div id="entries-list" class="flex-1 overflow-y-auto px-4 pb-8 custom-scrollbar">
            <!-- Entries injected here -->
            <div class="flex flex-col items-center justify-center h-40 opacity-20">
                <i class="fas fa-ghost text-2xl mb-2"></i>
                <span class="text-[10px] uppercase tracking-widest">No entries yet</span>
            </div>
        </div>

        <div class="p-6 border-t border-white/5 bg-black/20">
            <div class="flex items-center justify-between text-[10px] uppercase tracking-widest text-white/40 mb-4 px-2">
                <span>Reminders</span>
                <i class="fas fa-bell"></i>
            </div>
            <div class="flex items-center gap-3">
                <input type="time" id="reminder-time" class="bg-white/5 border border-white/10 rounded-full px-4 py-2 text-xs text-white outline-none flex-1">
                <button id="set-reminder" class="text-[10px] bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full transition-colors border border-white/10">Set</button>
            </div>
            <button id="request-notif-btn" class="w-full mt-4 text-[9px] uppercase tracking-widest opacity-30 hover:opacity-100 transition-all">Enable Notifications</button>
        </div>
    </aside>

    <!-- Main Workspace -->
    <main class="flex-1 flex flex-col relative overflow-hidden bg-black/20 z-10">
        
        <!-- Dashboard Tabs -->
        <nav class="flex items-center justify-between px-12 py-6 z-20">
            <a href="{{ url_for('home') }}" class="text-white/40 hover:text-white transition-all text-sm flex items-center gap-2">
                <i class="fas fa-chevron-left text-xs"></i> Home
            </a>
            <div class="flex gap-8">
                <button onclick="switchTab('journal')" id="tab-journal" class="tab-btn active text-sm uppercase tracking-[0.2em] font-medium opacity-100 transition-all border-b-2 border-white pb-1">Journal</button>
                <button onclick="switchTab('calendar')" id="tab-calendar" class="tab-btn text-sm uppercase tracking-[0.2em] font-medium opacity-40 hover:opacity-100 transition-all border-b-2 border-transparent pb-1">Calendar</button>
            </div>
            <div class="w-16"></div> <!-- Spacer for balance -->
        </nav>

        <!-- Journal View -->
        <section id="view-journal" class="flex-1 overflow-y-auto px-12 pb-24 z-10 custom-scrollbar active-view">
            <div class="max-w-4xl mx-auto py-8">
                
                <!-- Template Picker -->
                <div id="template-picker" class="flex flex-wrap gap-3 mb-12 justify-center">
                    <button onclick="selectTemplate('Custom Note')" class="temp-btn liquid-glass px-6 py-3 rounded-full text-xs font-medium hover:bg-white/5 border border-white/10 transition-all active">Custom Note</button>
                    <button onclick="selectTemplate('Daily Reflection')" class="temp-btn liquid-glass px-6 py-3 rounded-full text-xs font-medium hover:bg-white/5 border border-white/10 transition-all">Daily Reflection</button>
                    <button onclick="selectTemplate('Productivity')" class="temp-btn liquid-glass px-6 py-3 rounded-full text-xs font-medium hover:bg-white/5 border border-white/10 transition-all">Productivity</button>
                    <button onclick="selectTemplate('Mood Tracker')" class="temp-btn liquid-glass px-6 py-3 rounded-full text-xs font-medium hover:bg-white/5 border border-white/10 transition-all">Mood Tracker</button>
                    <button onclick="selectTemplate('Weekly Growth')" class="temp-btn liquid-glass px-6 py-3 rounded-full text-xs font-medium hover:bg-white/5 border border-white/10 transition-all">Weekly Growth</button>
                    <button onclick="selectTemplate('Future Vision')" class="temp-btn liquid-glass px-6 py-3 rounded-full text-xs font-medium hover:bg-white/5 border border-white/10 transition-all">Future Vision</button>
                </div>

                <!-- Main Form Body -->
                <div id="editor-container" class="liquid-glass-strong rounded-[40px] p-12 border border-white/10 shadow-2xl min-h-[600px] flex flex-col">
                    <div class="mb-10 flex flex-col items-center">
                        <input type="text" id="entry-title" placeholder="A Meaningful Title..." 
                            class="bg-transparent border-none text-center text-5xl font-heading italic text-white outline-none w-full lowercase">
                        <div id="active-template-label" class="mt-4 text-[10px] uppercase tracking-[0.3em] text-white/30 border border-white/10 px-4 py-1 rounded-full">Daily Reflection</div>
                    </div>

                    <div id="dynamic-fields" class="space-y-10 flex-1">
                        <!-- Template fields injected here -->
                    </div>

                    <div class="mt-16 pt-8 border-t border-white/5 flex justify-between items-center">
                        <div class="text-[10px] uppercase tracking-widest text-white/20">
                            Last Synced: <span id="sync-time">Never</span>
                        </div>
                        <div class="flex gap-4">
                            <button id="delete-btn" class="bg-white text-red-600 px-10 py-3 rounded-2xl font-bold hover:scale-[1.05] transition-all shadow-xl hidden flex items-center gap-2">
                                <i class="fas fa-trash-alt text-xs"></i> Delete Entry
                            </button>
                            <button id="save-btn" class="bg-white text-black px-10 py-3 rounded-2xl font-bold hover:scale-[1.05] transition-all shadow-xl">Save Note</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Calendar View -->
        <section id="view-calendar" class="flex-1 px-12 pb-12 z-10 hidden">
            <div class="max-w-6xl mx-auto h-full bg-white/5 backdrop-blur-xl rounded-[40px] border border-white/10 p-8 shadow-2xl">
                <div id='calendar' class="h-full"></div>
            </div>
        </section>

    </main>

    <script src="{{ url_for('static', filename='js/diary.js') }}"></script>
</body>
</html>
