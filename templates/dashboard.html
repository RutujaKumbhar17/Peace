<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Kai Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/liquid-glass.css') }}">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        heading: ["'Instrument Serif'", "serif"],
                        body: ["'Barlow'", "sans-serif"],
                    }
                }
            }
        }
    </script>
</head>
<body class="apple-theme bg-black min-h-screen p-6 md:p-12 overflow-x-hidden">

    <div class="max-w-6xl mx-auto">
        <header class="flex items-center justify-between mb-16">
            <a href="{{ url_for('home') }}" class="text-white/40 hover:text-white transition-colors no-underline">
                <i class="fas fa-arrow-left mr-2"></i> Home
            </a>
            <h1 class="text-4xl italic">Wellness Dashboard</h1>
            <div class="w-10"></div> <!-- Spacer -->
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="liquid-glass rounded-[40px] p-10 border border-white/5 relative overflow-hidden">
                <span class="text-[10px] uppercase tracking-widest text-white/30 mb-4 block">Total Reflections</span>
                <div id="diary-count" class="text-5xl font-heading italic">0</div>
                <i class="fas fa-book-open absolute right-8 bottom-8 text-white/5 text-4xl"></i>
            </div>
            
            <div class="liquid-glass rounded-[40px] p-10 border border-white/5 relative overflow-hidden">
                <span class="text-[10px] uppercase tracking-widest text-white/30 mb-4 block">Current Mood</span>
                <div id="top-mood" class="text-5xl font-heading italic">Neutral</div>
                <i class="fas fa-smile absolute right-8 bottom-8 text-white/5 text-4xl"></i>
            </div>

            <div class="liquid-glass rounded-[40px] p-10 border border-white/5 relative overflow-hidden">
                <span class="text-[10px] uppercase tracking-widest text-white/30 mb-4 block">Last Active</span>
                <div id="last-active" class="text-3xl font-heading italic mt-2">Never</div>
                <i class="fas fa-clock absolute right-8 bottom-8 text-white/5 text-4xl"></i>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            <div class="lg:col-span-2 liquid-glass rounded-[40px] p-12 border border-white/5">
                <div class="flex items-center justify-between mb-10">
                    <h3 class="text-3xl italic">Mood Analytics</h3>
                    <span class="text-white/20 text-[10px] uppercase tracking-widest">Last Conversations</span>
                </div>
                <div id="mood-bars" class="flex items-end gap-6 h-[200px] mt-10">
                    <!-- Dynamic bars will be inserted here -->
                </div>
            </div>

            <div class="liquid-glass rounded-[40px] p-12 border border-white/5">
                <h3 class="text-2xl italic mb-10">Recent Entries</h3>
                <div id="recent-diary-preview" class="space-y-4">
                    <p class="text-white/20 font-light italic">No entries yet.</p>
                </div>
                <a href="{{ url_for('diary') }}" class="mt-12 block text-white/40 hover:text-white transition-colors text-xs uppercase tracking-widest no-underline">
                    View full diary <i class="fas fa-arrow-right ml-1"></i>
                </a>
            </div>
        </div>

        <footer class="mt-32 pt-12 border-t border-white/5 text-center">
            <p class="text-[10px] text-white/10 uppercase tracking-[0.2em]">Kai Analytics V1.0 • Privacy Secured Locally & Gemini AI</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
