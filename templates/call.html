<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kai Video Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/liquid-glass.css') }}">
</head>
<body class="apple-theme bg-black h-screen overflow-hidden">

    <div class="relative h-full w-full">
        <header class="absolute top-0 left-0 w-full z-10 px-6 py-6 flex items-center justify-between pointer-events-none">
            <a href="{{ url_for('home') }}" class="liquid-glass rounded-full px-5 py-2 text-white/60 hover:text-white transition-all no-underline pointer-events-auto border border-white/5 flex items-center gap-2">
                <i class="fas fa-arrow-left text-xs"></i> Home
            </a>
            <div class="w-20 h-10 bg-white rounded-full flex items-center justify-center text-black font-bold tracking-tighter pointer-events-auto">KAI.</div>
            <div class="w-12 h-12"></div> <!-- Spacer -->
        </header>

        <div id="kai-video-container" class="w-full h-full bg-black">
            <iframe 
                id="trugen-agent"
                src="https://app.trugen.ai/embed/d905a885-9b48-4fa2-8a34-46d318fbe244?embedded=true&name=Guest&email=guest%40example.com&skip_home=true&hide_login=true&anonymous=true" 
                class="w-full h-full border-none"
                allow="camera; microphone; autoplay; display-capture; encrypted-media;"
            ></iframe>
            <div class="absolute bottom-10 left-1/2 -translate-x-1/2 z-10">
                <div class="liquid-glass rounded-full px-6 py-2 text-white/40 text-xs font-medium uppercase tracking-widest border border-white/5">
                    Kai (Agent)
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="{{ url_for('static', filename='js/client.js') }}"></script>
</body>
</html>
